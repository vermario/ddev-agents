name: ddev-agents
version: 1.0.0
description: "Standardized AI Agent environment for Wunder.io projects."

project_files:
  - docker-compose.agents.yaml
  - .devcontainer/devcontainer.json
  - commands/host/copilot
  - copilot-managed-config.json
post_install_actions:
  - rm -rf ../.devcontainer
  - mv .devcontainer ..
  - echo "🚀 DDEV Agents installed."
  - echo "👉 Run 'ddev restart' to build the Agents container."
  - echo "👉 Then reopen VS Code in the Container."
  - echo "👉 Or run 'ddev copilot' from the CLI."
